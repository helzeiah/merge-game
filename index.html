<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Merge">
<link rel="manifest" href="manifest.json">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);
}
body { background:#000; overflow:hidden; touch-action:none; }
canvas { display:block; }

/* ── Screens — gruvbox/material minimal, matches helzeiah.com ── */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #f5edda;
  z-index: 20;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s ease;
  padding: calc(var(--sat,0px) + 28px) calc(var(--sar,0px) + 24px) calc(var(--sab,0px) + 28px) calc(var(--sal,0px) + 24px);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  color: #2c2416; text-align: center; overflow-y: auto;
}
.screen.active { opacity: 1; pointer-events: all; }
/* Submit + rank screens show dead-ball canvas through the background */
#screen-submit, #screen-rank { background: rgba(245,237,218,0.88); }

.game-title { font-size: 1.75rem; font-weight: 600; color: #2c2416; margin-bottom: 4px; letter-spacing: -0.3px; }
.game-sub   { color: #8a7a62; font-size: 0.875rem; margin-bottom: 44px; }

.btn {
  display: block; width: 220px; padding: 10px 0;
  border-radius: 4px; border: 1px solid #d9cebc;
  font-size: 0.9rem; font-weight: 500; font-family: inherit;
  cursor: pointer; margin: 6px auto;
  transition: border-color 0.1s, background 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.65; }
.btn-primary   { background: #2c2416; color: #f5edda; border-color: #2c2416; }
.btn-secondary { background: transparent; color: #2c2416; }
.btn-ghost     { background: none; border: none; color: #8a7a62; font-size: 0.8rem;
                 padding: 8px 0; cursor: pointer; font-family: inherit;
                 display: block; width: 220px; margin: 2px auto; }

.screen h2 { font-size: 1.15rem; font-weight: 600; color: #2c2416; margin-bottom: 4px; }

.score-label { color: #8a7a62; font-size: 0.8rem; margin: 0; }
.score-big   { font-size: 3.25rem; font-weight: 700; color: #2c2416; line-height: 1; margin: 6px 0 18px; }

.name-input {
  display: block; width: 220px; margin: 10px auto 2px;
  padding: 9px 14px; border-radius: 4px;
  border: 1px solid #d9cebc; background: #ece2cc;
  color: #2c2416; font-size: 0.9rem; font-family: inherit;
  text-align: center; outline: none; -webkit-appearance: none;
}
.name-input:focus   { border-color: #6e5e44; }
.name-input::placeholder { color: #b0a88e; }
.char-count { font-size: 0.75rem; color: #8a7a62; margin-bottom: 10px; }
.err { color: #af3a03; font-size: 0.8rem; min-height: 18px; margin: 2px 0 6px; }

/* Leaderboard — post-list style */
.lb-wrap { width: 100%; max-width: 360px; margin: 12px auto; }
.lb-row  { display: flex; align-items: baseline; gap: 10px; padding: 0.55rem 0; border-bottom: 1px solid #d9cebc; }
.lb-row:first-child { border-top: 1px solid #d9cebc; }
.lb-rank  { width: 26px; font-size: 0.8rem; color: #8a7a62; flex-shrink: 0; }
.lb-name  { flex: 1; font-size: 0.9rem; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lb-score { font-size: 0.875rem; font-weight: 600; color: #2c2416; flex-shrink: 0; }
.lb-date  { font-size: 0.75rem; color: #8a7a62; flex-shrink: 0; }
.lb-empty   { color: #8a7a62; font-size: 0.875rem; margin: 28px 0; }
.lb-loading { color: #8a7a62; font-size: 0.875rem; margin: 28px 0; }

/* Rank reveal */
.rank-badge      { font-size: 3.5rem; font-weight: 700; color: #2c2416; line-height: 1; margin: 8px 0; }
.rank-sub        { font-size: 0.875rem; color: #8a7a62; margin-bottom: 0; }
.rank-name-disp  { font-size: 1.1rem; font-weight: 600; color: #2c2416; margin: 6px 0 2px; }
.rank-score-disp { font-size: 0.875rem; color: #8a7a62; margin-bottom: 28px; }
.btn-row { display: flex; gap: 8px; justify-content: center; }
.btn-row .btn { width: 140px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  TIERS  — white only tiny bit bigger than yellow,
//           rainbow only a little bigger than white
// ═══════════════════════════════════════════════════════════
const TIERS = [
  { tier:1,  radius:23, color:'#5BB8FF' },
  { tier:2,  radius:29, color:'#5CD65C' },
  { tier:3,  radius:38, color:'#E85DE8' },
  { tier:4,  radius:44, color:'#E85050' },
  { tier:5,  radius:53, color:'#E8913A' },
  { tier:6,  radius:60, color:'#E8D83A' },
  { tier:7,  radius:66, color:'#DDDDDD' },
  { tier:8,  radius:72, color:'RAINBOW' },
  { tier:9,  radius:60, color:'TIEDYE'  },
  { tier:10, radius:70, color:'PLANET'  },
];
const TIER_SCORES = [0,2,4,10,20,50,100,200,1000,150,400];
const PLANETS     = ['earth','mars','saturn','neptune','jupiter'];
const EXPRESSIONS = ['happy','sad','mad','surprised','sleepy'];
const PLANET_COLORS = {
  earth:  ['#1a6b3c','#1a4fa0','#8BC4E2','#2a8050'],
  mars:   ['#c1440e','#e27b52','#a33a0e','#d45520'],
  saturn: ['#c9a84c','#e8d28a','#8a6d2f','#d4b84c'],
  neptune:['#1a3a8c','#4a7fd4','#2a5aac','#6090e0'],
  jupiter:['#c9a47e','#e8c49a','#a08060','#d4b490'],
};
const ELEMENTS = ['fire','water','ice','earth','lightning','wind'];
const ELEMENT_CFG = {
  fire:      { fill:['#FF6B00','#FF3300','#FF9500'], aura:'255,80,0'    },
  water:     { fill:['#00AAFF','#0055CC','#66DDFF'], aura:'0,140,255'   },
  ice:       { fill:['#AADDFF','#66BBEE','#DDEEFF'], aura:'150,220,255' },
  earth:     { fill:['#7B3A0D','#4A5E28','#B06830'], aura:'120,70,15'   },
  lightning: { fill:['#FFE040','#FFCC00','#FFF8B0'], aura:'255,230,0'   },
  wind:      { fill:['#B8FFCC','#5EC870','#E8FFE8'], aura:'80,200,100'  },
};
// Weighted drop — lower tiers drop far more often
const DROP_WEIGHTS = [45, 30, 16, 9];

// ═══════════════════════════════════════════════════════════
//  CANVAS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = window.devicePixelRatio || 1;
canvas.width  = Math.round(window.innerWidth  * dpr);
canvas.height = Math.round(window.innerHeight * dpr);
canvas.style.width  = window.innerWidth  + 'px';
canvas.style.height = window.innerHeight + 'px';
ctx.scale(dpr, dpr);
const W = window.innerWidth;
const H = window.innerHeight;

// Safe-area insets — keeps UI clear of notch / Dynamic Island / home indicator
const _saStyle = getComputedStyle(document.documentElement);
const SAT = parseFloat(_saStyle.getPropertyValue('--sat')) || 0;
const SAB = parseFloat(_saStyle.getPropertyValue('--sab')) || 0;
const SAL = parseFloat(_saStyle.getPropertyValue('--sal')) || 0;
const SAR = parseFloat(_saStyle.getPropertyValue('--sar')) || 0;

const WORKER_URL = 'https://merge-game-worker.helzeiah.workers.dev';

// ═══════════════════════════════════════════════════════════
//  MATTER.JS
// ═══════════════════════════════════════════════════════════
const { Engine, World, Bodies, Body, Events, Composite } = Matter;
const engine = Engine.create({ gravity:{ x:0, y:0.65 }, enableSleeping:false });
let physicsEnabled = false;
const world  = engine.world;

// ═══════════════════════════════════════════════════════════
//  LAYOUT  — wider container, shorter walls
// ═══════════════════════════════════════════════════════════
const CX        = W / 2;
const wallThick = 24;
const wallAngle = 0.15;
const cW        = Math.min(W * 0.86, 360);
const wallH     = cW * 0.68;
const floorW    = cW * 0.72;
const cBottom   = H * 0.80;
const cTop      = cBottom - wallH;
const dropZoneY = cTop - 200;

const wallOffset = Math.sin(wallAngle) * wallH * 0.5;
const lWallX     = CX - floorW*0.5 - wallOffset;
const rWallX     = CX + floorW*0.5 + wallOffset;
const wallCY     = cBottom - wallH*0.5;

const wallOpts = { isStatic:true, restitution:0.2, friction:0.4, frictionStatic:0.5, label:'wall' };
const leftWall  = Bodies.rectangle(lWallX, wallCY, wallThick, wallH, Object.assign({}, wallOpts, { angle:-wallAngle }));
const rightWall = Bodies.rectangle(rWallX, wallCY, wallThick, wallH, Object.assign({}, wallOpts, { angle: wallAngle }));
const floor     = Bodies.rectangle(CX, cBottom, floorW, wallThick, wallOpts);
World.add(world, [leftWall, rightWall, floor]);

// ── Per-body contact map: bodyId → {otherId → {nx,ny,depth,om}} ──
// Maintained via collision events; no sleeping = contacts never stale.
const bodyContacts = {};

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let balls        = [];
let gameActive   = false;
let gameSession  = null; // {nonce, sig} from worker — used to validate score submission
let score        = 0;
let bestScore    = 0;

let playerName   = localStorage.getItem('playerName') || null;
// Dead-ball graveyard — persists across games and page loads
let deadBalls = [];
try { const _db = localStorage.getItem('deadBalls'); if (_db) deadBalls = JSON.parse(_db); } catch(e){}

let myRank       = null;
let myBest       = null;
let gameOver     = false;
let cashedOut    = false;
let nextTier     = randDropTier();
let nextNextTier = randDropTier();
let aimX         = CX;
let dropCooldown = 0;
const COOLDOWN   = 60;      // ~1.0 s
let hasTieDye    = false;
let hasPlanet    = false;
let bgSands      = 0;
let bgDark       = 0;
let sandDust     = null;
let loseBean     = null;

let lastMergeMs  = 0;
let comboCount   = 0;
let comboTimer   = 0;
let comboLabel   = '';
let comboColor   = '#fff';
let shakeFrames  = 0;
let popups       = [];
let sparks       = [];
let stars        = null;

// Abilities
const AB = {
  swap:       { uses:3, cooldown:0 },
  earthquake: { uses:3, cooldown:0 },
  walls:      { uses:3, cooldown:0 },
};
const AB_BTN = [
  { key:'swap',       x:0,y:0,w:56,h:56 },
  { key:'earthquake', x:0,y:0,w:56,h:56 },
  { key:'walls',      x:0,y:0,w:56,h:56 },
];
let extraWalls       = [];
let wallAbilityOn    = false;
let wallAbilityTimer = 0;

// Flag to block drop when an ability button was just pressed
let abilityJustPressed = false;

// Quake: multi-pulse state
let quakeActive = false;
let quakeTimer  = 0;      // total frames remaining
let quakePulse  = 0;      // frames until next pulse

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function randDropTier() {
  const total = DROP_WEIGHTS.reduce(function(a,b){ return a+b; }, 0);
  let r = Math.random() * total;
  for (let i=0; i<DROP_WEIGHTS.length; i++) {
    r -= DROP_WEIGHTS[i];
    if (r <= 0) return i + 1;
  }
  return 1;
}
function randInt(lo, hi) { return lo + Math.floor(Math.random()*(hi-lo)); }
function lerp(a, b, t)   { return a + (b-a)*t; }

function lighten(hex, amt) {
  if (hex==='RAINBOW'||hex==='TIEDYE'||hex==='PLANET') return '#fff';
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, ((n>>16)&0xff)+amt);
  const g = Math.min(255, ((n>>8) &0xff)+amt);
  const b = Math.min(255, ((n)    &0xff)+amt);
  return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
}

function hexToRgba(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return 'rgba('+((n>>16)&0xff)+','+((n>>8)&0xff)+','+(n&0xff)+','+a+')';
}

function getBall(body) {
  for (let i=0; i<balls.length; i++) { if (balls[i].body===body) return balls[i]; }
  return null;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,   x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h, x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,   x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,     x+r,y);
  ctx.closePath();
}

// ── Contact-normal deformed blob ──────────────────────────────
// contacts: [{cx,cy,amt}]  cx/cy = unit vector TOWARD the contact surface
// Each contact pushes the ball surface INWARD at the contact angle,
// and compensates with a slight outward bulge perpendicular to it.
// squishX/squishY = impact squish applied as ellipse pre-scale.
// 32-sample polygon — smooth enough, < 0.5 ms per ball at 60 fps.
function deformedBlobPath(r, contacts, sqX, sqY, wobble, seed) {
  const N = 16;
  const s = seed || 0;
  // Directional contact squish: vertical contact → shorter+wider; horizontal → narrower+taller.
  // Normalize by sqrt(count) so stacked contacts don't over-accumulate.
  let cSX = 1.0, cSY = 1.0;
  let droopAmt = 0; // smooth bottom-droop from above-pressure
  const cn = Math.sqrt(Math.max(1, contacts.length));
  for (let j = 0; j < contacts.length; j++) {
    const c = contacts[j];
    const p = Math.min(0.36, c.amt / r) / cn;
    if (Math.abs(c.cy) >= Math.abs(c.cx)) {
      if (c.cy < -0.3) {
        cSY = Math.min(cSY, 1.0 - p * 0.88);
        cSX = Math.max(cSX, 1.0 + p * 0.55);
        droopAmt = Math.max(droopAmt, p);
      }
    } else {
      cSX = Math.min(cSX, 1.0 - p * 0.70);
      cSY = Math.max(cSY, 1.0 + p * 0.42);
    }
  }
  const eSX = sqX * cSX;
  const eSY = sqY * cSY;
  const pts = [];
  for (let i = 0; i < N; i++) {
    const a    = (i / N) * Math.PI * 2;
    const cosA = Math.cos(a);
    const sinA = Math.sin(a);
    let rx  = cosA * eSX;
    let ry  = sinA * eSY;
    let rad = Math.sqrt(rx*rx + ry*ry) * r;
    const mag = rad / r;
    const ux  = (mag > 0.001) ? rx / mag : cosA;
    const uy  = (mag > 0.001) ? ry / mag : sinA;
    // Extend toward contact point (fills gap between touching balls)
    for (let j = 0; j < contacts.length; j++) {
      const c   = contacts[j];
      const dot = ux*c.cx + uy*c.cy;
      if (dot > 0.65) rad += Math.pow(dot - 0.65, 2) * c.amt * 0.22;
    }
    // Smooth bottom droop — spreads evenly across lower hemisphere, no spike
    if (droopAmt > 0) {
      const bottomness = Math.max(0, sinA - 0.18) / 0.82;
      rad *= 1.0 + droopAmt * bottomness * 0.40;
    }
    rad += Math.sin(a * 2 + (wobble||0) * 12) * (wobble||0);
    rad += Math.sin(a * 3 + s) * r * 0.013 + Math.cos(a * 5 + s * 1.7) * r * 0.007;
    rad  = Math.max(r * 0.65, rad); // raised floor prevents whitespace flat-chord artifacts
    pts.push({ x: cosA * rad, y: sinA * rad });
  }
  // Catmull-Rom spline — smooth organic outline through the radial samples
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 0; i < N; i++) {
    const p0 = pts[(i - 1 + N) % N];
    const p1 = pts[i];
    const p2 = pts[(i + 1) % N];
    const p3 = pts[(i + 2) % N];
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
  }
  ctx.closePath();
}

// Legacy wrapper (used for preview balls that have no contacts)
function blobPath(r, sqX, sqY, wobble) {
  deformedBlobPath(r, [], sqX, sqY, wobble);
}

// ═══════════════════════════════════════════════════════════
//  SOFT BODY — spring-mass perimeter simulation
//  Points stored as OFFSETS from body center, so the body
//  can move at any speed without points lagging behind.
//  Deformation is purely relative; springs restore to circle.
// ═══════════════════════════════════════════════════════════
const SOFT_N = 8;

function initSoftBody(ball) {
  const r = ball.r;
  ball.pts = [];
  for (let i = 0; i < SOFT_N; i++) {
    const a = (i / SOFT_N) * Math.PI * 2;
    ball.pts.push({ ox: Math.cos(a)*r, oy: Math.sin(a)*r, vx: 0, vy: 0 });
  }
}

function snapSoftBody(ball) {
  if (!ball.pts) { initSoftBody(ball); return; }
  const r = ball.r;
  for (let i = 0; i < SOFT_N; i++) {
    const a = (i / SOFT_N) * Math.PI * 2;
    ball.pts[i].ox = lerp(ball.pts[i].ox, Math.cos(a)*r, 0.32);
    ball.pts[i].oy = lerp(ball.pts[i].oy, Math.sin(a)*r, 0.32);
    ball.pts[i].vx = 0; ball.pts[i].vy = 0;
  }
}

// Push nearest perimeter offsets inward on collision
function applySoftImpulse(ball, nx, ny, impulse) {
  if (!ball.pts) initSoftBody(ball);
  const N = SOFT_N, r = ball.r;
  let bestIdx = 0, bestDot = -Infinity;
  for (let i = 0; i < N; i++) {
    const d = Math.sqrt(ball.pts[i].ox*ball.pts[i].ox + ball.pts[i].oy*ball.pts[i].oy) || 1;
    const dot = (ball.pts[i].ox/d)*nx + (ball.pts[i].oy/d)*ny;
    if (dot > bestDot) { bestDot = dot; bestIdx = i; }
  }
  const mag = Math.min(impulse * r * 3.5, r * 0.58);
  for (let di = -2; di <= 2; di++) {
    const idx = (bestIdx + di + N) % N;
    const w   = Math.max(0, 1.0 - Math.abs(di) * 0.44);
    ball.pts[idx].ox -= nx * mag * w;
    ball.pts[idx].oy -= ny * mag * w;
  }
}

function stepSoftBody(ball) {
  if (!ball.pts) { initSoftBody(ball); return; }
  if (ball.merging || ball.spawning) { snapSoftBody(ball); return; }
  const N = SOFT_N, r = ball.r;
  const restLen = 2 * r * Math.sin(Math.PI / N);

  // Sustained contact pressure — push offsets inward along contact normal
  const bMap = bodyContacts[ball.body.id] || {};
  Object.keys(bMap).forEach(function(otherId) {
    const c = bMap[otherId];
    if (c.om >= 1e6) return;
    const massMult = Math.min(2.2, 1.0 + Math.sqrt(c.om / (ball.body.mass || 1)) * 0.75);
    const pushMag  = Math.min(c.depth * 0.013 * massMult, r * 0.065);
    if (pushMag < 0.04) return;
    for (let i = 0; i < N; i++) {
      const p = ball.pts[i];
      const d = Math.sqrt(p.ox*p.ox + p.oy*p.oy) || 1;
      const dot = (p.ox/d)*c.nx + (p.oy/d)*c.ny;
      if (dot > 0.22) {
        const w    = (dot - 0.22) / 0.78;
        const nx2  = p.ox - c.nx * pushMag * w;
        const ny2  = p.oy - c.ny * pushMag * w;
        if (Math.sqrt(nx2*nx2 + ny2*ny2) > r * 0.40) { p.ox = nx2; p.oy = ny2; }
      }
    }
  });

  // Spring-mass integration on offsets
  for (let i = 0; i < N; i++) {
    const p    = ball.pts[i];
    const dist = Math.sqrt(p.ox*p.ox + p.oy*p.oy) || 0.001;
    // Radial spring: pull offset back to circle perimeter
    p.vx -= (p.ox / dist) * (dist - r) * 0.30;
    p.vy -= (p.oy / dist) * (dist - r) * 0.30;
    // Neighbor springs: resist tangential bunching
    [-1, 1].forEach(function(di) {
      const nb  = ball.pts[(i + di + N) % N];
      const ndx = p.ox - nb.ox, ndy = p.oy - nb.oy;
      const nd  = Math.sqrt(ndx*ndx + ndy*ndy) || 0.001;
      p.vx -= (ndx / nd) * (nd - restLen) * 0.10;
      p.vy -= (ndy / nd) * (nd - restLen) * 0.10;
    });
    p.vx *= 0.80; p.vy *= 0.80; // damping
    p.ox += p.vx; p.oy += p.vy;
    // Hard clamp
    const cd = Math.sqrt(p.ox*p.ox + p.oy*p.oy) || 0.001;
    if      (cd > r * 1.55) { p.ox = (p.ox/cd)*r*1.55; p.oy = (p.oy/cd)*r*1.55; }
    else if (cd < r * 0.42) { p.ox = (p.ox/cd)*r*0.42; p.oy = (p.oy/cd)*r*0.42; }
  }
}

// Draw blob using offset points (already in local/body-relative space)
function softBlobPath(ball) {
  if (!ball.pts) initSoftBody(ball);
  const pts = ball.pts, N = pts.length;
  ctx.beginPath();
  ctx.moveTo(pts[0].ox, pts[0].oy);
  for (let i = 0; i < N; i++) {
    const i0 = (i-1+N)%N, i2 = (i+1)%N, i3 = (i+2)%N;
    const cp1x = pts[i].ox  + (pts[i2].ox - pts[i0].ox) / 6;
    const cp1y = pts[i].oy  + (pts[i2].oy - pts[i0].oy) / 6;
    const cp2x = pts[i2].ox - (pts[i3].ox - pts[i].ox)  / 6;
    const cp2y = pts[i2].oy - (pts[i3].oy - pts[i].oy)  / 6;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, pts[i2].ox, pts[i2].oy);
  }
  ctx.closePath();
}


// ═══════════════════════════════════════════════════════════
//  AUDIO  (Web Audio API — fully synthesised, no files needed)
// ═══════════════════════════════════════════════════════════
let sfx = null;   // AudioContext — created on first user gesture (iOS policy)

function initSfx() {
  if (sfx) return;
  try { sfx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  if (!sfx) return;
  // iOS 17+: shift audio session to 'playback' category so it ignores the ringer switch
  try { if (navigator.audioSession) navigator.audioSession.type = 'playback'; } catch(e){}
  // Older iOS: play a silent one-frame buffer to unlock media category
  try {
    const buf = sfx.createBuffer(1, 1, 22050);
    const src = sfx.createBufferSource();
    src.buffer = buf; src.connect(sfx.destination); src.start(0);
  } catch(e){}
}
function resumeSfx() { if (sfx && sfx.state === 'suspended') sfx.resume(); }

// White-noise buffer source of (dur) seconds
function mkNoise(dur) {
  const n   = Math.ceil(sfx.sampleRate * dur);
  const buf = sfx.createBuffer(1, n, sfx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i=0;i<n;i++) d[i] = Math.random()*2-1;
  const src = sfx.createBufferSource();
  src.buffer = buf;
  return src;
}

// Single sine note helper
function mkNote(freq, startT, dur, vol, type) {
  const o = sfx.createOscillator();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, startT);
  const g = sfx.createGain();
  g.gain.setValueAtTime(0, startT);
  g.gain.linearRampToValueAtTime(vol, startT + 0.012);
  g.gain.exponentialRampToValueAtTime(0.001, startT + dur);
  o.connect(g); g.connect(sfx.destination);
  o.start(startT); o.stop(startT + dur + 0.04);
}

// ── Merge: soft wet blob collision — like two water balloons touching ──
function playSlosh(tier) {
  if (!sfx) return;
  resumeSfx();
  const t   = sfx.currentTime + 0.01;
  const vol = 0.18 + Math.min(tier, 8) * 0.015;

  // Layer 1: low-passed noise burst — the "splat" body
  const ns1 = mkNoise(0.28);
  const lp1 = sfx.createBiquadFilter();
  lp1.type  = 'lowpass';
  lp1.frequency.setValueAtTime(600, t);
  lp1.frequency.exponentialRampToValueAtTime(80, t + 0.22);
  lp1.Q.value = 2.0;
  const g1  = sfx.createGain();
  g1.gain.setValueAtTime(vol * 0.9, t + 0.003);
  g1.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
  ns1.connect(lp1); lp1.connect(g1); g1.connect(sfx.destination);
  ns1.start(t); ns1.stop(t + 0.28);

  // Layer 2: pitched "blip" sine — the pitch-bend of the blob
  const freq = Math.max(80, 220 - tier * 12);
  const o   = sfx.createOscillator();
  o.type    = 'sine';
  o.frequency.setValueAtTime(freq * 1.6, t);
  o.frequency.exponentialRampToValueAtTime(freq, t + 0.12);
  const og  = sfx.createGain();
  og.gain.setValueAtTime(vol * 0.55, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  o.connect(og); og.connect(sfx.destination);
  o.start(t); o.stop(t + 0.20);
}

// ── Drop: very subtle soft "plop" — barely audible release ──
function playSwoosh() {
  if (!sfx) return;
  resumeSfx();
  const t  = sfx.currentTime + 0.01;
  // A gentle low sine "thud" like releasing a ball
  const o  = sfx.createOscillator();
  o.type   = 'sine';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(55, t + 0.09);
  const g  = sfx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.07, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.10);
  o.connect(g); g.connect(sfx.destination);
  o.start(t); o.stop(t + 0.11);
}

// ── Combo / achievement chime — tier 5+ merges ──
// Frequencies roughly: C5, Eb5, G5, C6, D5, F#5
const CHIME_HZ = [0,0,0,0,0, 523, 622, 784, 1047, 587, 740];
function playChime(tier, combo) {
  if (!sfx || tier < 5) return;
  resumeSfx();
  const base = CHIME_HZ[Math.min(tier, 10)];
  const t    = sfx.currentTime + 0.01;

  if (combo >= 3) {
    // Insane: rapid ascending arpeggio with shimmer
    mkNote(base,       t,        0.42, 0.32);
    mkNote(base*1.25,  t+0.09,   0.38, 0.28);
    mkNote(base*1.5,   t+0.18,   0.50, 0.33);
    mkNote(base*2,     t+0.27,   0.65, 0.38);
    // Shimmer noise burst
    const sh  = mkNoise(0.25);
    const shf = sfx.createBiquadFilter();
    shf.type  = 'highpass'; shf.frequency.value = 5000;
    const shg = sfx.createGain();
    shg.gain.setValueAtTime(0.06, t+0.20);
    shg.gain.exponentialRampToValueAtTime(0.001, t+0.45);
    sh.connect(shf); shf.connect(shg); shg.connect(sfx.destination);
    sh.start(t+0.20); sh.stop(t+0.45);
  } else if (combo === 2) {
    // Double: warm two-note chime
    mkNote(base,      t,       0.32, 0.27);
    mkNote(base*1.5,  t+0.11,  0.42, 0.29);
  } else {
    // Single high-tier merge: soft warm ding
    mkNote(base,       t,       0.40, 0.25);
    if (tier >= 7) mkNote(base*1.26, t+0.05, 0.34, 0.16); // harmony
    if (tier >= 8) mkNote(base*1.5,  t+0.10, 0.38, 0.13); // third note for rainbow
  }
}

// ═══════════════════════════════════════════════════════════
//  CREATE BALL
// ═══════════════════════════════════════════════════════════
function createBall(x, y, tier, vy) {
  vy = vy || 0;
  const td   = TIERS[tier-1];
  const r    = td.radius;
  const body = Bodies.circle(x, y, r, {
    restitution:0.18, friction:0.55, frictionAir:0.01,
    frictionStatic:0.6, density:0.002, slop:0.5,
    label:'ball_' + tier
  });
  Body.setVelocity(body, { x:0, y:vy });
  World.add(world, body);

  const ball = {
    body, tier, r,
    color: td.color,
    merging:   false,
    pts:       null,  // soft-body perimeter points (initialized on first stepSoftBody call)
    wobble:    0,
    seed:      Math.random() * 6.28,
    popScale:  0.1,
    spawning:  true,
    spawnTick: 0,
    origMass: body.mass, origR: r,
    expression: tier===9 ? EXPRESSIONS[randInt(0,EXPRESSIONS.length)] : (tier===10?'stoic':null),
    planet:     tier===10 ? PLANETS[randInt(0,PLANETS.length)] : null,
    tieDye:     null,
    element:    tier===9  ? ELEMENTS[randInt(0,ELEMENTS.length)] : null,
    hueOffset:  0,
    eyeX: 0.15, eyeY: 0, eyeTargetX: 0.15, eyeTargetY: 0,
    faceDelay:  20,
  };
  balls.push(ball);
  if (tier===9  && !hasTieDye) hasTieDye = true;
  if (tier===10 && !hasPlanet) hasPlanet = true;
  return ball;
}

// ═══════════════════════════════════════════════════════════
//  MERGE
// ═══════════════════════════════════════════════════════════
function emitMergeSparks(mx, my, color) {
  // Burst — firework-style radial spray
  for (let i = 0; i < 28; i++) {
    const a     = Math.random() * Math.PI * 2;
    const speed = 1.8 + Math.random() * 5.5;
    sparks.push({ x:mx, y:my,
      vx: Math.cos(a) * speed, vy: Math.sin(a) * speed - 1.2,
      life: 0.85 + Math.random() * 0.5,
      size: 2 + Math.random() * 3.5,
      color: (Math.random() < 0.3) ? '#fff' : color,
      grav: 0.13, decay: 0.022 + Math.random() * 0.018 });
  }
  // Small inner flash
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    sparks.push({ x:mx, y:my,
      vx: Math.cos(a) * 1.2, vy: Math.sin(a) * 1.2,
      life: 0.6, size: 5 + Math.random() * 4,
      color: '#fff', grav: 0, decay: 0.06 });
  }
}

function triggerMerge(a, b) {
  a.merging = true; b.merging = true;
  a.mergePair = b; b.mergePair = a;
  // Bias merge point 60% toward whichever ball is falling faster (the dropper)
  const aFalling = a.body.velocity.y >= b.body.velocity.y;
  const mx  = aFalling
    ? a.body.position.x * 0.60 + b.body.position.x * 0.40
    : b.body.position.x * 0.60 + a.body.position.x * 0.40;
  const my  = aFalling
    ? a.body.position.y * 0.60 + b.body.position.y * 0.40
    : b.body.position.y * 0.60 + a.body.position.y * 0.40;
  const avx = (a.body.velocity.x + b.body.velocity.x) * 0.5;
  const nt  = Math.min(a.tier + 1, 10);
  const now = Date.now();
  const base= TIER_SCORES[nt];
  let mult  = 1.0;
  if (now - lastMergeMs < 1500) {
    comboCount++;
    if (comboCount===2){ mult=1.2;  comboLabel='Combo!';   comboColor='#FFE84A'; }
    if (comboCount>=3) { mult=1.44; comboLabel='INSANE!!'; comboColor='#4AFFFF'; }
  } else {
    comboCount=1; comboLabel='';
  }
  lastMergeMs = now;
  comboTimer  = 90;
  playSlosh(nt);
  playChime(nt, comboCount);
  const earned = Math.round(base * mult);
  score += earned;
  if (score > bestScore) bestScore = score;
  popups.push({ x:mx, y:my-20, text:'+'+earned, life:1.0, color:comboCount>1?'#FFE84A':'#fff', combo:comboCount>1 });

  // Remove physics bodies immediately; animation is purely visual
  delete bodyContacts[a.body.id]; delete bodyContacts[b.body.id];
  try { World.remove(world, a.body); } catch(_){}
  try { World.remove(world, b.body); } catch(_){}

  // Store animation state so drawBallFill can animate them flying toward midpoint
  const mergeColor = TIERS[nt-1] ? TIERS[nt-1].color : a.color;
  a.mergeFromX=a.body.position.x; a.mergeFromY=a.body.position.y;
  b.mergeFromX=b.body.position.x; b.mergeFromY=b.body.position.y;
  a.mergeToX=mx; a.mergeToY=my;
  b.mergeToX=mx; b.mergeToY=my;
  a.mergeStartMs=now; b.mergeStartMs=now;
  a.mergeColor=mergeColor; b.mergeColor=mergeColor;

  setTimeout(function() {
    balls = balls.filter(function(bb){ return bb!==a && bb!==b; });
    if (nt >= 5) emitMergeSparks(mx, my, mergeColor);
    if (nt > 10) return;
    const nb = createBall(mx, my, nt, -2);
    Body.setVelocity(nb.body, { x:avx * 0.5, y:-2 });
  }, 150);
}

// ═══════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════
// ── Contact normal tracking via events ───────────────────────
// Matter.js collision.normal points FROM bodyB TOWARD bodyA (pushes A away).
// "toward-contact" for A = toward B = NEGATE normal.
// "toward-contact" for B = toward A = SAME as normal.
function applyContactPair(pair) {
  const a  = pair.bodyA, b = pair.bodyB;
  const nx = pair.collision.normal.x, ny = pair.collision.normal.y;
  const d  = pair.collision.depth || 0;
  if (!bodyContacts[a.id]) bodyContacts[a.id] = {};
  if (!bodyContacts[b.id]) bodyContacts[b.id] = {};
  bodyContacts[a.id][b.id] = { nx: -nx, ny: -ny, depth: d, om: b.isStatic ? 1e6 : (b.mass||0) };
  bodyContacts[b.id][a.id] = { nx:  nx, ny:  ny, depth: d, om: a.isStatic ? 1e6 : (a.mass||0) };
}

function applyImpactSquish(ball, nx, ny, impulse) {
  const sq = Math.min(impulse * 0.28, 0.22);
  if (Math.abs(ny) >= Math.abs(nx)) {
    ball.squishY = Math.max(0.72, ball.squishY - sq);
    ball.squishX = Math.min(1.40, 1.0 / Math.sqrt(ball.squishY));
  } else {
    ball.squishX = Math.max(0.72, ball.squishX - sq);
    ball.squishY = Math.min(1.40, 1.0 / Math.sqrt(ball.squishX));
  }
}

Events.on(engine, 'collisionStart', function(ev) {
  ev.pairs.forEach(function(pair) {
    applyContactPair(pair);
    const { bodyA, bodyB, collision } = pair;
    const ba  = getBall(bodyA);
    const bb  = getBall(bodyB);
    const dep = (collision && collision.depth) ? collision.depth : 1;
    const nx  = collision.normal.x, ny = collision.normal.y;
    // Velocity-based impulse: a fast-falling ball squishes harder than a slow one
    const relVn = Math.max(0,
      (bodyA.velocity.x - bodyB.velocity.x) * nx +
      (bodyA.velocity.y - bodyB.velocity.y) * ny
    );
    const imp = Math.min(relVn * 0.06 + dep * 0.3, 0.42);
    if (ba && imp > 0.04) applySoftImpulse(ba, -nx, -ny, imp);
    if (bb && imp > 0.04) applySoftImpulse(bb,  nx,  ny, imp);
    if (!ba||!bb) return;
    if (ba.tier===bb.tier && !ba.merging && !bb.merging) triggerMerge(ba, bb);
  });
});

Events.on(engine, 'collisionActive', function(ev) {
  ev.pairs.forEach(function(pair) {
    applyContactPair(pair);
    const ba = getBall(pair.bodyA), bb = getBall(pair.bodyB);
    if (ba && bb && ba.tier===bb.tier && !ba.merging && !bb.merging) triggerMerge(ba, bb);
  });
});

Events.on(engine, 'collisionEnd', function(ev) {
  ev.pairs.forEach(function(pair) {
    const a = pair.bodyA, b = pair.bodyB;
    if (bodyContacts[a.id]) delete bodyContacts[a.id][b.id];
    if (bodyContacts[b.id]) delete bodyContacts[b.id][a.id];
  });
});

//  DROP
// ═══════════════════════════════════════════════════════════
function dropBall() {
  if (gameOver||cashedOut||dropCooldown>0) return;
  playSwoosh();
  const r  = TIERS[nextTier-1].radius;
  const cx = Math.max(CX - cW*0.50 + r, Math.min(CX + cW*0.50 - r, aimX));
  const nb = createBall(cx, dropZoneY - r, nextTier);
  nb.popScale=0.1; nb.spawning=true; nb.spawnTick=0;
  dropCooldown  = COOLDOWN;
  nextTier      = nextNextTier;
  nextNextTier  = randDropTier();
}

// ── Swap: quick "whoosh" pitch sweep ──
function playSwapSound() {
  if (!sfx) return;
  resumeSfx();
  const t = sfx.currentTime + 0.01;
  const ns = mkNoise(0.20);
  const bf = sfx.createBiquadFilter();
  bf.type = 'bandpass';
  bf.frequency.setValueAtTime(380, t);
  bf.frequency.exponentialRampToValueAtTime(3400, t + 0.14);
  bf.Q.value = 1.8;
  const g = sfx.createGain();
  g.gain.setValueAtTime(0.20, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.20);
  ns.connect(bf); bf.connect(g); g.connect(sfx.destination);
  ns.start(t); ns.stop(t + 0.22);
  mkNote(900,  t + 0.05, 0.16, 0.12);
  mkNote(1340, t + 0.11, 0.13, 0.09);
}

// ── Quake: sub-bass thud + low rumble ──
function playQuakeSound() {
  if (!sfx) return;
  resumeSfx();
  const t = sfx.currentTime + 0.01;
  const o = sfx.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(85, t);
  o.frequency.exponentialRampToValueAtTime(24, t + 0.38);
  const g = sfx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.60, t + 0.016);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.40);
  o.connect(g); g.connect(sfx.destination);
  o.start(t); o.stop(t + 0.42);
  const ns = mkNoise(0.42);
  const lp = sfx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 300; lp.Q.value = 3;
  const ng = sfx.createGain();
  ng.gain.setValueAtTime(0.26, t + 0.02);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.42);
  ns.connect(lp); lp.connect(ng); ng.connect(sfx.destination);
  ns.start(t); ns.stop(t + 0.44);
}

// ═══════════════════════════════════════════════════════════
//  ABILITIES
// ═══════════════════════════════════════════════════════════
function useAbility(key) {
  const ab = AB[key];
  // Block if no uses, active cooldown, or walls already on
  if (ab.uses<=0) return;
  if (ab.cooldown>0) return;
  if (key==='walls' && wallAbilityOn) return;
  if (gameOver||cashedOut) return;

  ab.uses--;

  if (key==='swap') {
    playSwapSound();
    nextTier = randDropTier();
    ab.cooldown = 20; // short lock so double-tap doesn't consume 2

  } else if (key==='earthquake') {
    playQuakeSound();
    ab.cooldown  = 600;
    quakeActive  = true;
    quakeTimer   = 480; // 8 seconds
    quakePulse   = 0;   // fire immediately

  } else if (key==='walls') {
    playWallsSound();
    wallAbilityOn    = true;
    wallAbilityTimer = 960;  // 16 seconds (double quake)
    ab.cooldown      = 960;
    const extH = wallH * 0.44;
    const eLX  = lWallX - Math.sin(wallAngle)*(wallH*0.5+extH*0.5);
    const eLY  = wallCY  - Math.cos(wallAngle)*(wallH*0.5+extH*0.5);
    const eRX  = rWallX + Math.sin(wallAngle)*(wallH*0.5+extH*0.5);
    const eRY  = wallCY  - Math.cos(wallAngle)*(wallH*0.5+extH*0.5);
    extraWalls = [
      Bodies.rectangle(eLX, eLY, wallThick, extH, Object.assign({},wallOpts,{angle:-wallAngle})),
      Bodies.rectangle(eRX, eRY, wallThick, extH, Object.assign({},wallOpts,{angle: wallAngle})),
    ];
    World.add(world, extraWalls);
  }
}

// ═══════════════════════════════════════════════════════════
//  LOSE CHECK
// ═══════════════════════════════════════════════════════════
function checkLose() {
  for (let i=0; i<balls.length; i++) {
    const b = balls[i];
    if (b.merging||b.spawning||b.dyingAnim) continue;
    if (b.body.position.y > cBottom + 60) {
      if (!loseBean) {
        loseBean = b;
        b.dyingAnim  = true;
        b.dyingTick  = 0;
        b.dyingFromX = b.body.position.x;
        b.dyingFromY = Math.min(b.body.position.y, H + b.r);
        physicsEnabled = false;
        gameOver = true;
      }
      return;
    }
  }
}

// ═══════════════════════════════════════════════════════════
//  RESTART
// ═══════════════════════════════════════════════════════════
function restart() {
  balls.forEach(function(b){ try{World.remove(world,b.body);}catch(_){} });
  balls=[];
  extraWalls.forEach(function(w){ try{World.remove(world,w);}catch(_){} });
  extraWalls=[];
  wallAbilityOn=false; wallAbilityTimer=0;
  score=0; gameOver=false; cashedOut=false;
  dropCooldown=60; nextTier=randDropTier(); nextNextTier=randDropTier(); aimX=CX;
  physicsEnabled=true;
  comboCount=0; comboTimer=0; comboLabel=''; shakeFrames=0;
  popups=[]; sparks=[];
  AB.swap.uses=3;       AB.swap.cooldown=0;
  AB.earthquake.uses=3; AB.earthquake.cooldown=0;
  AB.walls.uses=3;      AB.walls.cooldown=0;
  quakeActive=false; quakeTimer=0; quakePulse=0;
  Object.keys(bodyContacts).forEach(function(k){ delete bodyContacts[k]; });
  hasTieDye=false; hasPlanet=false; bgSands=0; bgDark=0; sandDust=null; loseBean=null;
}

// ═══════════════════════════════════════════════════════════
//  INPUT  — ability flag prevents accidental drop
// ═══════════════════════════════════════════════════════════
function evX(e){ return (e.touches&&e.touches[0]?e.touches[0]:(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0]:e)).clientX; }
function evY(e){ return (e.touches&&e.touches[0]?e.touches[0]:(e.changedTouches&&e.changedTouches[0]?e.changedTouches[0]:e)).clientY; }
function hitBtn(x,y,bx,by,bw,bh){ return x>=bx&&x<=bx+bw&&y>=by&&y<=by+bh; }

canvas.addEventListener('touchstart', function(e){ e.preventDefault(); onDown(evX(e),evY(e)); },{passive:false});
canvas.addEventListener('mousedown',  function(e){ onDown(e.clientX,e.clientY); });
canvas.addEventListener('touchmove',  function(e){ e.preventDefault(); aimX=Math.max(0,Math.min(W,evX(e))); },{passive:false});
canvas.addEventListener('mousemove',  function(e){ aimX=Math.max(0,Math.min(W,e.clientX)); });
canvas.addEventListener('touchend',   function(e){ e.preventDefault(); onUp(evX(e),evY(e)); },{passive:false});
canvas.addEventListener('mouseup',    function(e){ onUp(e.clientX,e.clientY); });

function onDown(x,y) {
  initSfx(); resumeSfx();
  aimX=x;
  abilityJustPressed=false;
  if (gameOver||cashedOut) {
    if (hitBtn(x,y,W/2-70,H*0.62,140,50)) restart();
    return;
  }
  for (let i=0;i<AB_BTN.length;i++) {
    const btn=AB_BTN[i];
    if (hitBtn(x,y,btn.x,btn.y,btn.w,btn.h)) {
      useAbility(btn.key);
      abilityJustPressed=true;
      return;
    }
  }
  if (hitBtn(x,y,W-84-SAR,62+SAT,74,40)) { cashedOut=true; physicsEnabled=false; gameActive=false; openSubmit(); return; }
}

function onUp(x,y) {
  if (abilityJustPressed) { abilityJustPressed=false; return; }
  if (gameOver||cashedOut) return;
  dropBall();
}

// ═══════════════════════════════════════════════════════════
//  DRAW — BACKGROUND
// ═══════════════════════════════════════════════════════════
function drawBackground() {
  // Layer 1: light cream grid (fades as red sands rises)
  const light = 1 - bgSands;
  if (light > 0.01) {
    ctx.fillStyle='rgba(240,236,224,'+light+')';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(200,192,168,'+(light*0.72)+')';
    ctx.lineWidth=1;
    for (let x=0;x<W;x+=18){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for (let y=0;y<H;y+=18){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  }
  // Layer 2: red sands (tier 9 — fades as galaxy rises)
  const sandsAlpha = bgSands * (1 - bgDark);
  if (sandsAlpha > 0.01) {
    ctx.fillStyle='rgba(62,14,8,'+sandsAlpha+')';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(140,44,18,'+(sandsAlpha*0.45)+')';
    ctx.lineWidth=1;
    for (let x=0;x<W;x+=20){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for (let y=0;y<H;y+=20){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
    if (!sandDust) {
      sandDust=[];
      for (let i=0;i<28;i++) sandDust.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.3,t:Math.random()*6.28,vx:(Math.random()-0.5)*0.5});
    }
    sandDust.forEach(function(s){
      s.t+=0.009; s.x+=s.vx; if(s.x<0)s.x+=W; if(s.x>W)s.x-=W;
      ctx.fillStyle='rgba(220,100,30,'+((Math.sin(s.t)+1)*0.5*sandsAlpha)+')';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fill();
    });
  }
  // Layer 3: galaxy/dark (tier 10)
  if (bgDark > 0.01) {
    ctx.fillStyle='rgba(10,10,20,'+bgDark+')';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(35,35,65,'+(bgDark*0.5)+')';
    ctx.lineWidth=1;
    for (let x=0;x<W;x+=20){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
    for (let y=0;y<H;y+=20){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
    if (!stars) {
      stars=[];
      for (let i=0;i<32;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.4,t:Math.random()*6.28});
    }
    stars.forEach(function(s){
      s.t+=0.018;
      ctx.fillStyle='rgba(255,255,255,'+((Math.sin(s.t)+1)*0.5*bgDark)+')';
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.283);ctx.fill();
    });
  }
}

// ═══════════════════════════════════════════════════════════
//  DRAW — STRIPED WALLS
// ═══════════════════════════════════════════════════════════
function drawWallBody(body, w, h, glow) {
  ctx.save();
  ctx.translate(body.position.x, body.position.y);
  ctx.rotate(body.angle);
  ctx.beginPath(); ctx.rect(-w/2,-h/2,w,h); ctx.clip();
  ctx.fillStyle= glow ? '#e0ffff' : '#fff'; ctx.fillRect(-w/2,-h/2,w,h);
  ctx.fillStyle= glow ? '#009999' : '#111';
  const s=10;
  for (let d=-h*2; d<w+h*2; d+=s*2) {
    ctx.beginPath();
    ctx.moveTo(-w/2+d,       -h/2);
    ctx.lineTo(-w/2+d+h,      h/2);
    ctx.lineTo(-w/2+d+h+s,    h/2);
    ctx.lineTo(-w/2+d+s,     -h/2);
    ctx.closePath(); ctx.fill();
  }
  ctx.strokeStyle= glow ? '#00ffff' : '#111';
  ctx.lineWidth = glow ? 7 : 5;
  ctx.strokeRect(-w/2,-h/2,w,h);
  ctx.restore();
}

function drawContainer() {
  drawWallBody(leftWall,  wallThick, wallH,    false);
  drawWallBody(rightWall, wallThick, wallH,    false);
  drawWallBody(floor,     floorW,   wallThick, false);
  if (wallAbilityOn) extraWalls.forEach(function(w){ drawWallBody(w,wallThick,wallH*0.44,true); });
}

// ═══════════════════════════════════════════════════════════
//  DRAW — BALL FILL
// ═══════════════════════════════════════════════════════════
function applyFill(ball, r) {
  const c = ball.color;
  if (c==='RAINBOW') {
    const ho = ball.hueOffset || 0;
    const g=ctx.createLinearGradient(-r,0,r,0);
    [0,40,80,140,200,270,320].forEach(function(h,i,a){
      g.addColorStop(i/(a.length-1),'hsl('+((h+ho)%360)+',100%,55%)');
    });
    ctx.fillStyle=g;
  } else if (c==='TIEDYE') {
    const el = ball.element || 'fire';
    const cfg = ELEMENT_CFG[el];
    const cols = cfg ? cfg.fill : ['#f0f','#0ff','#ff0'];
    const g=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.05,0,0,r);
    g.addColorStop(0,cols[0]); g.addColorStop(0.5,cols[1]); g.addColorStop(1,cols[2]);
    ctx.fillStyle=g;
  } else if (c==='PLANET') {
    const pc=PLANET_COLORS[ball.planet]||PLANET_COLORS.earth;
    const g=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.07,0,0,r);
    g.addColorStop(0,pc[2]); g.addColorStop(0.45,pc[0]); g.addColorStop(1,pc[1]);
    ctx.fillStyle=g;
  } else {
    const g=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.07,0,0,r);
    g.addColorStop(0,lighten(c,44)); g.addColorStop(1,c);
    ctx.fillStyle=g;
  }
}

// ═══════════════════════════════════════════════════════════
//  DRAW — FACE
// ═══════════════════════════════════════════════════════════
function drawFace(ball, r) {
  const tier=ball.tier;
  const expr=ball.expression||tier;
  ctx.save();
  // blob is world-aligned, no body-angle to undo — face is naturally upright

  const es  = r*0.21;
  const esp = r*0.30;
  const eyY = -r*0.08;
  const moY = r*0.34;

  // Eye tracking: pupil drifts toward velocity direction + random glances
  const eyeDX = (ball.eyeX !== undefined ? ball.eyeX : 0.15) * es;
  const eyeDY = (ball.eyeY !== undefined ? ball.eyeY : 0) * es * 0.65;

  function drawEye(ex, ey, type) {
    const ow = r * 0.07;
    if (type==='dot') {
      ctx.fillStyle='#fff';  ctx.beginPath();ctx.arc(ex,ey,es*0.85,0,6.283);ctx.fill();
      ctx.strokeStyle='#111';ctx.lineWidth=ow;ctx.beginPath();ctx.arc(ex,ey,es*0.85,0,6.283);ctx.stroke();
      ctx.fillStyle='#111';  ctx.beginPath();ctx.arc(ex+eyeDX,ey+eyeDY,es*0.5,0,6.283);ctx.fill();
    } else if (type==='half') {
      ctx.save();
      ctx.beginPath();ctx.arc(ex,ey,es*1.35,0,6.283);ctx.clip();
      ctx.fillStyle='#fff';ctx.fillRect(ex-es*2,ey-es*2,es*4,es*2+1);
      ctx.restore();
      ctx.strokeStyle='#111';ctx.lineWidth=ow;
      ctx.beginPath();ctx.arc(ex,ey,es*1.35,Math.PI,0);ctx.stroke();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex+eyeDX,ey+Math.max(0,eyeDY)+es*0.2,es*0.65,0,6.283);ctx.fill();
    } else if (type==='furrow') {
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,es*1.25,0,6.283);ctx.fill();
      ctx.strokeStyle='#111';ctx.lineWidth=ow;ctx.beginPath();ctx.arc(ex,ey,es*1.25,0,6.283);ctx.stroke();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex+eyeDX*0.4,ey+es*0.1+eyeDY*0.4,es*0.72,0,6.283);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex-es*0.1,ey-es*0.1,es*0.26,0,6.283);ctx.fill();
      ctx.strokeStyle='#111';ctx.lineWidth=r*0.055;ctx.lineCap='round';
      ctx.beginPath();
      if(ex<0){ctx.moveTo(ex-es*1.3,ey-es*1.6);ctx.lineTo(ex+es*0.8,ey-es*1.1);}
      else    {ctx.moveTo(ex-es*0.8,ey-es*1.1);ctx.lineTo(ex+es*1.3,ey-es*1.6);}
      ctx.stroke();
    } else {
      const big=(type==='wide'||type==='star')?1.5:1.28;
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,es*big,0,6.283);ctx.fill();
      ctx.strokeStyle='#111';ctx.lineWidth=ow;ctx.beginPath();ctx.arc(ex,ey,es*big,0,6.283);ctx.stroke();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(ex+eyeDX,ey+eyeDY,es*big*0.58,0,6.283);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+eyeDX-es*0.18,ey+eyeDY-es*0.25,es*0.3,0,6.283);ctx.fill();
    }
    if (type==='star') {
      ctx.fillStyle='#FFD700';
      for(let k=0;k<4;k++){
        const a=(k/4)*6.283;
        ctx.beginPath();ctx.arc(ex+Math.cos(a)*es*1.15,ey+Math.sin(a)*es*1.15,es*0.2,0,6.283);ctx.fill();
      }
    }
  }

  let eyeT='round';
  if(tier===1) eyeT='dot';
  else if(tier===4) eyeT='furrow';
  else if(tier===5||tier===7||tier===8) eyeT='wide';
  else if(tier===8) eyeT='star';
  else if(tier===6||expr==='sleepy') eyeT='half';
  else if(expr==='surprised') eyeT='wide';
  if(tier===8) eyeT='star';

  drawEye(-esp,eyY,eyeT);
  drawEye( esp,eyY,eyeT);

  ctx.strokeStyle='#111';ctx.lineWidth=r*0.066;ctx.lineCap='round';
  const mT=(tier===1||tier===4||expr==='mad')?'flat':
            (tier===7||expr==='sad')?'frown':
            (tier===3||tier===8)?'grin':
            (tier===5)?'smirk':
            (tier===2||tier===6||expr==='sleepy')?'gentle':'smile';
  ctx.beginPath();
  if(mT==='flat')  { ctx.moveTo(-r*0.22,moY);ctx.lineTo(r*0.22,moY); }
  else if(mT==='frown') { ctx.arc(0,moY+r*0.28,r*0.24,Math.PI+0.25,-0.25); }
  else if(mT==='grin')  { ctx.arc(0,moY-r*0.08,r*0.34,0.1,Math.PI-0.1); }
  else if(mT==='smirk') { ctx.moveTo(-r*0.15,moY+r*0.05);ctx.quadraticCurveTo(r*0.05,moY-r*0.12,r*0.26,moY-r*0.04); }
  else if(mT==='gentle'){ ctx.arc(0,moY-r*0.08,r*0.2,0.25,Math.PI-0.25); }
  else                   { ctx.arc(0,moY-r*0.08,r*0.27,0.2,Math.PI-0.2); }
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  DRAW — SPLIT BALL PASSES (fill → stroke → face)
//  Drawn in separate passes so neck connectors layer correctly.
// ═══════════════════════════════════════════════════════════
function ballTransform(ball, sc) {
  ctx.translate(ball.body.position.x, ball.body.position.y);
  const va = ball.velAngle;
  ctx.rotate(va);
  ctx.scale(ball.velStretch * sc, ball.velCompress * sc);
  ctx.rotate(-va);
}

function drawBallFill(ball) {
  if (ball.merging) {
    const elapsed = Date.now() - ball.mergeStartMs;
    const t  = Math.min(1, elapsed / 150);
    const t2 = t * t;            // ease-in: accelerates toward target
    const px = ball.mergeFromX + (ball.mergeToX - ball.mergeFromX) * t2;
    const py = ball.mergeFromY + (ball.mergeToY - ball.mergeFromY) * t2;
    const sc = Math.max(0, 1 - t * 0.88);
    if (sc < 0.04) return;
    // Trail sparks every other frame
    if (t > 0.05 && Math.random() < 0.55) {
      sparks.push({ x:px, y:py,
        vx:(Math.random()-0.5)*1.8, vy:(Math.random()-0.5)*1.8 - 0.3,
        life:0.65+Math.random()*0.2, size:2+Math.random()*2,
        color:ball.mergeColor||ball.color, grav:0.04, decay:0.055 });
    }
    ctx.save();
    ctx.translate(px, py);
    ctx.globalAlpha = 1 - t * 0.6;
    ctx.scale(sc, sc);
    applyFill(ball, ball.r);
    blobPath(ball.r, 1, 1, 0); ctx.fill();
    ctx.strokeStyle='#111'; ctx.lineWidth=Math.max(3, ball.r*0.13);
    blobPath(ball.r, 1, 1, 0); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }
  const r  = ball.r;
  const sc = ball.spawning ? ball.popScale : 1.0;
  ctx.save();
  ctx.translate(ball.body.position.x, ball.body.position.y);
  if (ball.spawning) ctx.scale(sc, sc);
  applyFill(ball, r);
  softBlobPath(ball);
  ctx.fill();
  ctx.save();
  ctx.clip();
  const _shd = ctx.createRadialGradient(0, 0, r*0.35, 0, 0, r);
  _shd.addColorStop(0,   'rgba(0,0,0,0)');
  _shd.addColorStop(0.6, 'rgba(0,0,0,0)');
  _shd.addColorStop(1.0, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = _shd; ctx.fillRect(-r*2,-r*2,r*4,r*4);
  const _glr = ctx.createRadialGradient(-r*0.38,-r*0.42,0,-r*0.3,-r*0.35,r*0.56);
  _glr.addColorStop(0,   'rgba(255,255,255,0.45)');
  _glr.addColorStop(0.55,'rgba(255,255,255,0.07)');
  _glr.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = _glr; ctx.fillRect(-r*2,-r*2,r*4,r*4);
  ctx.restore();
  if (ball.planet==='saturn') {
    ctx.strokeStyle='rgba(210,180,100,0.8)';
    ctx.lineWidth=r*0.13;
    ctx.beginPath();ctx.ellipse(0,r*0.07,r*1.55,r*0.32,0,0,6.283);ctx.stroke();
  }
  ctx.restore();
}

function drawBallStroke(ball) {
  if (ball.merging) return;
  const r  = ball.r;
  const sc = ball.spawning ? ball.popScale : 1.0;
  ctx.save();
  ctx.translate(ball.body.position.x, ball.body.position.y);
  if (ball.spawning) ctx.scale(sc, sc);
  ctx.strokeStyle='#111';
  ctx.lineWidth=Math.max(4, r*0.14);
  softBlobPath(ball);
  ctx.stroke();
  ctx.restore();
}

function drawBallFace(ball) {
  if (ball.merging || ball.faceDelay > 0) return;
  if (ball.body.speed >= 1.6) return;
  const r  = ball.r;
  const sc = ball.spawning ? ball.popScale : 1.0;
  ctx.save();
  ctx.translate(ball.body.position.x, ball.body.position.y);
  if (ball.spawning) ctx.scale(sc, sc);
  drawFace(ball, r);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  DRAW — BALL AURA (tier 9 elemental glow, tier 10 planet glow)
// ═══════════════════════════════════════════════════════════
function drawBallAura(ball) {
  if (ball.merging || ball.spawning) return;
  const r  = ball.r;
  const px = ball.body.position.x, py = ball.body.position.y;
  const t  = _frameSec;
  if (ball.tier === 9 && ball.element) {
    const cfg   = ELEMENT_CFG[ball.element];
    const pulse = 0.55 + Math.sin(t * 3.8) * 0.25;
    const grd   = ctx.createRadialGradient(px, py, r*0.65, px, py, r*1.6);
    grd.addColorStop(0,   'rgba('+cfg.aura+','+(pulse*0.50)+')');
    grd.addColorStop(0.6, 'rgba('+cfg.aura+','+(pulse*0.20)+')');
    grd.addColorStop(1,   'rgba('+cfg.aura+',0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(px, py, r*1.6, 0, 6.283); ctx.fill();
  }
  if (ball.tier === 10 && ball.planet) {
    const pc    = PLANET_COLORS[ball.planet] || PLANET_COLORS.earth;
    const pulse = 0.45 + Math.sin(t * 2.4) * 0.20;
    const grd   = ctx.createRadialGradient(px, py, r*0.75, px, py, r*1.65);
    grd.addColorStop(0,   hexToRgba(pc[0], pulse*0.45));
    grd.addColorStop(0.5, hexToRgba(pc[0], pulse*0.15));
    grd.addColorStop(1,   hexToRgba(pc[0], 0));
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(px, py, r*1.65, 0, 6.283); ctx.fill();
  }
}

// ═══════════════════════════════════════════════════════════
//  DRAW — MERGE NECK (jello bridge between merging balls)
// ═══════════════════════════════════════════════════════════
function drawMergeNeck(a, b) {
  const elapsed = Date.now() - a.mergeStartMs;
  const t = Math.min(1, elapsed / 150);
  if (t >= 0.92) return;
  const t2 = t * t;

  const ax = a.mergeFromX + (a.mergeToX - a.mergeFromX) * t2;
  const ay = a.mergeFromY + (a.mergeToY - a.mergeFromY) * t2;
  const bx = b.mergeFromX + (b.mergeToX - b.mergeFromX) * t2;
  const by = b.mergeFromY + (b.mergeToY - b.mergeFromY) * t2;

  const dx = bx - ax, dy = by - ay;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 2) return;

  const sc  = Math.max(0, 1 - t * 0.88);
  const ra  = a.r * sc, rb = b.r * sc;
  const ux  = dx / dist, uy = dy / dist;
  const px  = -uy, py = ux;

  const halfW = Math.min(ra, rb) * 0.55 * (1 - t);
  if (halfW < 0.5) return;
  const neckW = halfW * 0.38;

  const aex = ax + ux * ra * 0.75, aey = ay + uy * ra * 0.75;
  const bex = bx - ux * rb * 0.75, bey = by - uy * rb * 0.75;
  const midX = (aex + bex) / 2, midY = (aey + bey) / 2;

  const c = a.mergeColor || a.color;
  ctx.save();
  ctx.globalAlpha = (1 - t) * 0.88;
  ctx.fillStyle   = (c === 'RAINBOW' || c === 'TIEDYE' || c === 'PLANET') ? '#ccc' : c;

  ctx.beginPath();
  ctx.moveTo(aex + px * halfW, aey + py * halfW);
  ctx.quadraticCurveTo(midX + px * neckW, midY + py * neckW, bex + px * halfW, bey + py * halfW);
  ctx.lineTo(bex - px * halfW, bey - py * halfW);
  ctx.quadraticCurveTo(midX - px * neckW, midY - py * neckW, aex - px * halfW, aey - py * halfW);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = Math.max(1.5, Math.min(ra, rb) * 0.10);
  ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  DRAW — AIM LINE
// ═══════════════════════════════════════════════════════════
function drawAimLine() {
  if (gameOver||cashedOut) return;
  const ready=dropCooldown<=0;
  const td=TIERS[nextTier-1];
  const r=td.radius;
  const cx=Math.max(CX - cW*0.50 + r, Math.min(CX + cW*0.50 - r, aimX));

  ctx.strokeStyle=ready?'rgba(255,255,255,0.82)':'rgba(136,136,136,0.42)';
  ctx.setLineDash([7,7]); ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(cx,dropZoneY);ctx.lineTo(cx,cTop-r-6);ctx.stroke();
  ctx.setLineDash([]);

  // Preview ball above aim line
  ctx.save();
  ctx.globalAlpha=ready?1.0:0.45;
  ctx.translate(cx, dropZoneY-r-4);
  const fb={ body:{position:{x:cx,y:0},angle:0,speed:0,isSleeping:true},
             tier:nextTier,r,color:td.color,squishX:1,squishY:1,
             velStretch:1,velCompress:1,velAngle:0,wobble:0,
             spawning:false,popScale:1,expression:null,planet:null,tieDye:null,merging:false };
  applyFill(fb, r);
  blobPath(r,1,1,0);ctx.fill();
  ctx.strokeStyle='#111';ctx.lineWidth=Math.max(3,r*0.115);
  blobPath(r,1,1,0);ctx.stroke();
  ctx.restore();ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════
//  DRAW — HUD
// ═══════════════════════════════════════════════════════════
function drawUI() {
  ctx.fillStyle='#fff'; ctx.font='bold 23px Arial';
  ctx.textAlign='left';

}

function drawTierBar() {
  const spacing=30, dotR=12;
  const totalW=(TIERS.length-1)*spacing;
  const sx=W/2-totalW/2;
  const by=H-38-SAB;
  // Background panel
  const padX=18, padY=10;
  const px=sx-dotR-padX, py=by-dotR-padY, pw=totalW+dotR*2+padX*2, ph=dotR*2+padY*2, pr=10;
  ctx.fillStyle='rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.moveTo(px+pr,py); ctx.lineTo(px+pw-pr,py); ctx.quadraticCurveTo(px+pw,py,px+pw,py+pr);
  ctx.lineTo(px+pw,py+ph-pr); ctx.quadraticCurveTo(px+pw,py+ph,px+pw-pr,py+ph);
  ctx.lineTo(px+pr,py+ph); ctx.quadraticCurveTo(px,py+ph,px,py+ph-pr);
  ctx.lineTo(px,py+pr); ctx.quadraticCurveTo(px,py,px+pr,py); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.stroke();
  // Tiers 1-4 always visible
  const seen=new Set(balls.map(function(b){return b.tier;}));
  const known=new Set([1,2,3,4]);
  seen.forEach(function(t){known.add(t);});
  TIERS.forEach(function(td,i){
    const cx=sx+i*spacing;
    if (known.has(td.tier)) {
      if(td.color==='RAINBOW'){
        const g=ctx.createLinearGradient(cx-dotR,by,cx+dotR,by);
        ['#f00','#f80','#ff0','#0f0','#08f','#80f'].forEach(function(c,j,a){g.addColorStop(j/(a.length-1),c);});
        ctx.fillStyle=g;
      } else if(td.color==='TIEDYE') ctx.fillStyle='#e040fb';
      else if(td.color==='PLANET')   ctx.fillStyle='#2244cc';
      else ctx.fillStyle=td.color;
    } else { ctx.fillStyle='#1c1c1c'; }
    ctx.beginPath();ctx.arc(cx,by,dotR,0,6.283);ctx.fill();
    ctx.strokeStyle=known.has(td.tier)?'#ccc':'#444';
    ctx.lineWidth=2.5;ctx.stroke();
    if (!known.has(td.tier)){
      ctx.fillStyle='#888';ctx.font='bold 10px Arial';ctx.textAlign='center';
      ctx.fillText('?',cx,by+3.5);ctx.textAlign='left';
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  DRAW — DYING BALL (game-over animation)
// ═══════════════════════════════════════════════════════════
function drawDyingBall(ball) {
  const tick  = ball.dyingTick;
  const r     = ball.r;
  const destX = W / 2;
  const destY = H / 2;
  let px, py, spin, sc;

  if (tick <= 45) {
    // Phase 1: fly from overflow to screen center
    const t    = tick / 45;
    const ease = 1 - Math.pow(1 - t, 3);
    px   = ball.dyingFromX + (destX - ball.dyingFromX) * ease;
    py   = ball.dyingFromY + (destY - ball.dyingFromY) * ease;
    px  += Math.sin(tick * 0.38) * 14 * (1 - ease);
    spin = t * Math.PI * 0.6;
    sc   = 1.0;
  } else if (tick <= 110) {
    // Phase 2: lazy slow rotation (~1.5 turns over 65 frames)
    const t = (tick - 45) / 65;
    px   = destX; py = destY;
    spin = Math.PI * 0.6 + t * Math.PI * 3;
    sc   = 1.0;
  } else {
    // Phase 3: spin decelerates, ball zooms to 2.5x over 80 frames
    const t    = Math.min(1, (tick - 110) / 80);
    const ease = t * t * (3 - 2 * t); // smoothstep
    px   = destX; py = destY;
    spin = Math.PI * 3.6 + (1 - ease) * Math.PI * 0.8;
    sc   = 1.0 + ease * 1.5;
  }

  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(spin);
  ctx.scale(sc, sc);

  applyFill(ball, r);
  blobPath(r, 1, 1, 0); ctx.fill();

  // Inner shadow + glare
  ctx.save();
  blobPath(r, 1, 1, 0); ctx.clip();
  const _ds = ctx.createRadialGradient(r*0.3,r*0.35,0,0,0,r*1.15);
  _ds.addColorStop(0.35,'rgba(0,0,0,0)'); _ds.addColorStop(1,'rgba(0,0,0,0.30)');
  ctx.fillStyle=_ds; ctx.fillRect(-r*1.6,-r*1.6,r*3.2,r*3.2);
  ctx.restore();

  ctx.strokeStyle='#111'; ctx.lineWidth=Math.max(3, r*0.13);
  blobPath(r, 1, 1, 0); ctx.stroke();

  // Red X eyes
  const es  = r * 0.22;
  const esp = r * 0.30;
  const eyY = -r * 0.08;
  ctx.strokeStyle='#dd1111'; ctx.lineWidth=Math.max(2.5, r*0.10); ctx.lineCap='round';
  [-esp, esp].forEach(function(ex) {
    ctx.beginPath(); ctx.moveTo(ex-es,eyY-es); ctx.lineTo(ex+es,eyY+es); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex-es,eyY+es); ctx.lineTo(ex+es,eyY-es); ctx.stroke();
  });
  ctx.restore();
}

//  DRAW — DEAD BALL GRAVEYARD (game-over screen background)

function drawDeadBall(db) {
  const r = db.r;
  ctx.save();
  ctx.globalAlpha = 0.80;
  ctx.translate(db.x, db.y);
  ctx.rotate(db.angle);
  const _fb = { color:db.color, tier:db.tier, planet:db.planet, element:db.element, hueOffset:0, tieDye:null };
  applyFill(_fb, r);
  blobPath(r, 1, 1, db.seed); ctx.fill();
  ctx.save();
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.283); ctx.clip();
  const _shd = ctx.createRadialGradient(0,0,r*0.35,0,0,r);
  _shd.addColorStop(0,'rgba(0,0,0,0)'); _shd.addColorStop(0.6,'rgba(0,0,0,0)'); _shd.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle=_shd; ctx.fillRect(-r,-r,r*2,r*2);
  const _glr = ctx.createRadialGradient(-r*0.38,-r*0.42,0,-r*0.3,-r*0.35,r*0.56);
  _glr.addColorStop(0,'rgba(255,255,255,0.48)'); _glr.addColorStop(0.55,'rgba(255,255,255,0.08)'); _glr.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=_glr; ctx.fillRect(-r,-r,r*2,r*2);
  ctx.restore();
  ctx.strokeStyle='#111'; ctx.lineWidth=Math.max(3,r*0.13);
  blobPath(r, 1, 1, db.seed); ctx.stroke();
  const es=r*0.22, esp=r*0.30, eyY=-r*0.08;
  ctx.strokeStyle='#dd1111'; ctx.lineWidth=Math.max(2.5,r*0.10); ctx.lineCap='round';
  [-esp,esp].forEach(function(ex){
    ctx.beginPath(); ctx.moveTo(ex-es,eyY-es); ctx.lineTo(ex+es,eyY+es); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ex-es,eyY+es); ctx.lineTo(ex+es,eyY-es); ctx.stroke();
  });
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
let _frameSec = 0; // seconds, updated once per frame — avoids Date.now() per-ball
let _lastFrameMs = performance.now();

function loop() {
  requestAnimationFrame(loop);
  const _now = performance.now();
  const _rawDt = Math.min(_now - _lastFrameMs, 50); // cap at 50ms to prevent spiral of death
  _lastFrameMs = _now;
  _frameSec = _now / 1000;

  // Physics sub-stepping: 3 steps/frame — smoother stacking + collision resolution
  // Using actual elapsed time so physics runs at correct speed on any refresh rate (60/120/etc)
  if (physicsEnabled) {
    const _dt = _rawDt / 3;
    Engine.update(engine, _dt);
    Engine.update(engine, _dt);
    Engine.update(engine, _dt);
  }

  // Death animation runs outside normal gameActive gating
  if (loseBean) {
    loseBean.dyingTick++;
    ctx.save(); drawBackground(); drawContainer();
    balls.forEach(function(b){ if(!b.dyingAnim) drawBallAura(b); });
    balls.forEach(function(b){ if(!b.dyingAnim) drawBallFill(b); });
    balls.forEach(function(b){ if(!b.dyingAnim) drawBallStroke(b); });
    balls.forEach(function(b){ if(!b.dyingAnim) drawBallFace(b); });
    drawDyingBall(loseBean);
    ctx.restore(); drawUI();
    if (loseBean.dyingTick >= 190) {
      // Add this ball to the persistent graveyard
      const _m = loseBean.r * 1.6;
      deadBalls.push({
        x: _m + Math.random() * (W - _m*2),
        y: _m + Math.random() * (H - _m*2),
        r: loseBean.r, color: loseBean.color, tier: loseBean.tier,
        planet: loseBean.planet, element: loseBean.element,
        angle: Math.random() * Math.PI * 2,
        seed:  loseBean.seed || Math.random() * 6.28,
      });
      if (deadBalls.length > 50) deadBalls.shift();
      try { localStorage.setItem('deadBalls', JSON.stringify(deadBalls)); } catch(e){}
      loseBean=null; gameActive=false; openSubmit();
    }
    return;
  }

  if (!gameActive) {
    if (deadBalls.length > 0) {
      ctx.clearRect(0,0,W,H);
      drawBackground();
      deadBalls.forEach(drawDeadBall);
    }
    return;
  }

  if (hasTieDye  && bgSands<1) bgSands=Math.min(1,bgSands+0.004);
  if (hasPlanet  && bgDark<1)  bgDark =Math.min(1,bgDark +0.004);
  if (dropCooldown>0) dropCooldown--;

  // Ability cooldowns
  ['swap','earthquake','walls'].forEach(function(k){ if(AB[k].cooldown>0) AB[k].cooldown--; });

  // Walls timer
  if (wallAbilityOn){ wallAbilityTimer--; if(wallAbilityTimer<=0){
    wallAbilityOn=false;
    extraWalls.forEach(function(w){ try{World.remove(world,w);}catch(_){} });
    extraWalls=[];
  }}

  // Quake multi-pulse: small hop every 22 frames for ~4 seconds
  if (quakeActive) {
    quakeTimer--;
    quakePulse--;
    if (quakePulse <= 0) {
      quakePulse = 65; // ~1.1s between pulses
      playQuakeSound();
      Composite.allBodies(world).forEach(function(b) {
        if (b.isStatic) return;
        // Don't directly toss balls above the container — they get pushed by physics below
        if (b.position.y < cTop) return;
        // Only toss resting balls — skip any already moving upward from a prior pulse
        if (b.velocity.y < -0.5) return;
        const cmap = bodyContacts[b.id] || {};
        const hasContact = Object.keys(cmap).length > 0;
        if (!hasContact) return;
        b.isSleeping   = false;
        b.sleepCounter = 0;
        Body.setVelocity(b, {
          x: b.velocity.x + (Math.random()-0.5) * 7,
          y: -(4 + Math.random() * 4)
        });
      });
    }
    if (quakeTimer <= 0) quakeActive = false;
  }

  // ── Soft-body simulation: step all perimeter points ──────────
  balls.forEach(function(ball) { stepSoftBody(ball); });

  // ── Per-ball animation updates ──────────────────────────────
  balls.forEach(function(ball) {
    // Spawn pop
    if (ball.spawning) {
      ball.spawnTick++;
      ball.popScale=Math.min(1.0, ball.spawnTick/8);
      if (ball.popScale>=1.0) ball.spawning=false;
    }
    if (ball.faceDelay > 0) ball.faceDelay--;

    const speed = ball.body.speed;

    // Eye tracking — follows velocity; random glances when idle
    if (speed > 1.2) {
      ball.eyeTargetX = Math.max(-0.75, Math.min(0.75, ball.body.velocity.x * 0.22));
      ball.eyeTargetY = Math.max(-0.55, Math.min(0.55, ball.body.velocity.y * 0.16));
    } else if (Math.random() < 0.003) {
      ball.eyeTargetX = (Math.random() - 0.5) * 1.0;
      ball.eyeTargetY = (Math.random() - 0.5) * 0.5;
    }
    ball.eyeX = lerp(ball.eyeX, ball.eyeTargetX, 0.07);
    ball.eyeY = lerp(ball.eyeY, ball.eyeTargetY, 0.07);

    // Rainbow hue rotation
    if (ball.tier === 8) ball.hueOffset = (ball.hueOffset + 0.8) % 360;

    // Elemental particle emission (capped so sparks array never blooms)
    if (ball.tier === 9 && ball.element && !ball.spawning && sparks.length < 120 && Math.random() < 0.08) {
      const el = ball.element;
      const cfg = ELEMENT_CFG[el];
      const _r = ball.r;
      const _ang = Math.random() * Math.PI * 2;
      const _d   = _r * (0.55 + Math.random() * 0.45);
      const _ex  = ball.body.position.x + Math.cos(_ang) * _d;
      const _ey  = ball.body.position.y + Math.sin(_ang) * _d;
      let _vx, _vy, _life, _sz, _grav, _decay, _col;
      if (el==='fire') {
        _vx=(Math.random()-0.5)*1.5; _vy=-(1.5+Math.random()*2.5);
        _life=0.7+Math.random()*0.4; _sz=2+Math.random()*3;
        _grav=-0.06; _decay=0.035;
        _col=['#FF6B00','#FF3300','#FF9900','#FFD700'][randInt(0,4)];
      } else if (el==='water') {
        _vx=(Math.random()-0.5)*1.0; _vy=1.5+Math.random()*2.0;
        _life=0.6+Math.random()*0.3; _sz=1.5+Math.random()*2.5;
        _grav=0.12; _decay=0.04;
        _col=['#00AAFF','#0077DD','#66CCFF'][randInt(0,3)];
      } else if (el==='ice') {
        _vx=(Math.random()-0.5)*2.2; _vy=(Math.random()-0.5)*2.2;
        _life=0.8+Math.random()*0.5; _sz=1.5+Math.random()*2.5;
        _grav=0.01; _decay=0.025;
        _col=['#AADDFF','#FFFFFF','#88CCEE'][randInt(0,3)];
      } else if (el==='earth') {
        _vx=(Math.random()-0.5)*1.5; _vy=-(0.5+Math.random()*1.5);
        _life=0.5+Math.random()*0.3; _sz=2+Math.random()*3;
        _grav=0.18; _decay=0.048;
        _col=['#8B4513','#556B2F','#CD853F','#D2691E'][randInt(0,4)];
      } else if (el==='lightning') {
        _vx=(Math.random()-0.5)*6; _vy=(Math.random()-0.5)*6;
        _life=0.25+Math.random()*0.2; _sz=1+Math.random()*2;
        _grav=0; _decay=0.12;
        _col=Math.random()<0.7?'#FFFF00':'#FFFFFF';
      } else { // wind
        _vx=(Math.random()-0.5)*3.5; _vy=-(0.4+Math.random()*1.5);
        _life=0.6+Math.random()*0.4; _sz=1+Math.random()*2;
        _grav=-0.04; _decay=0.04;
        _col=['#CCFFCC','#88DD88','#FFFFFF'][randInt(0,3)];
      }
      sparks.push({ x:_ex, y:_ey, vx:_vx, vy:_vy, life:_life, size:_sz, color:_col, grav:_grav, decay:_decay });
    }
  });

  if (comboTimer>0) comboTimer--;

  // Screen shake
  const sx2=shakeFrames>0?(Math.random()-0.5)*7:0;
  const sy2=shakeFrames>0?(Math.random()-0.5)*7:0;
  if (shakeFrames>0) shakeFrames--;

  if (!gameOver&&!cashedOut&&balls.length>0) checkLose();

  // Proximity merge — catches same-tier balls that are touching but whose
  // collision event was missed (e.g. slow settle, post-squish contact).
  if (!gameOver&&!cashedOut) {
    for (let _i=0;_i<balls.length;_i++) {
      for (let _j=_i+1;_j<balls.length;_j++) {
        const _a=balls[_i], _b=balls[_j];
        if (_a.tier!==_b.tier||_a.merging||_b.merging||_a.spawning||_b.spawning) continue;
        const _dx=_a.body.position.x-_b.body.position.x;
        const _dy=_a.body.position.y-_b.body.position.y;
        if (_dx*_dx+_dy*_dy < (_a.r+_b.r)*(_a.r+_b.r)) triggerMerge(_a,_b);
      }
    }
  }

  ctx.save();
  if (shakeFrames>0) ctx.translate(sx2,sy2);
  drawBackground();
  drawContainer();
  balls.forEach(drawBallAura);
  // Merge neck connectors (jello bridge — drawn before fills so balls sit on top)
  const _neckDrawn = new Set();
  balls.forEach(function(ball) {
    if (!ball.merging || !ball.mergePair || _neckDrawn.has(ball)) return;
    _neckDrawn.add(ball); _neckDrawn.add(ball.mergePair);
    drawMergeNeck(ball, ball.mergePair);
  });
  balls.forEach(drawBallFill);
  balls.forEach(drawBallStroke);
  balls.forEach(drawBallFace);
  // Sparks (merge trails + firework burst) — hard cap at 160 oldest-first
  sparks = sparks.filter(function(s){ return s.life > 0; });
  if (sparks.length > 160) sparks.splice(0, sparks.length - 160);
  sparks.forEach(function(s) {
    s.x += s.vx; s.y += s.vy;
    s.vy += s.grav; s.vx *= 0.96;
    s.life -= s.decay;
    ctx.globalAlpha = Math.max(0, s.life);
    ctx.fillStyle = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, Math.max(0.5, s.size * s.life), 0, 6.283);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  drawAimLine();
  ctx.restore();
  drawUI();
}

requestAnimationFrame(loop);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}

// ═══════════════════════════════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  if (id) document.getElementById('screen-' + id).classList.add('active');
}

// ═══════════════════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════════════════
function startGame() {
  showScreen(null);
  gameActive = true;
  gameOver   = false;
  cashedOut  = false;
  restart();
  gameSession = null; // fresh session fetched in openSubmit() right when game ends
}

// Called by submit screen's Play Again button — skips home screen
function playAgain() {
  startGame();
}

// ═══════════════════════════════════════════════════════════
//  SUBMIT SCREEN
// ═══════════════════════════════════════════════════════════
function openSubmit() {
  document.querySelector('#screen-submit h2').textContent = cashedOut ? 'Cashed Out!' : 'Game Over';
  document.getElementById('final-score').textContent = score.toLocaleString();
  document.getElementById('name-err').textContent = '';
  document.getElementById('submit-name').value = playerName || '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'Submit Score';
  updateCharCount();
  showScreen('submit');
  // Always fetch a fresh session here — the one from startGame() may have expired
  // if the player spent a long time in game
  gameSession = null;
  fetch(WORKER_URL + '/session')
    .then(function(r) { return r.json(); })
    .then(function(s) { gameSession = s; })
    .catch(function() { gameSession = null; });
}

function updateCharCount() {
  var v = document.getElementById('submit-name').value;
  document.getElementById('char-count').textContent = v.length + ' / 20';
}

async function submitScore() {
  const nameEl  = document.getElementById('submit-name');
  const errEl   = document.getElementById('name-err');
  const btn     = document.getElementById('submit-btn');
  const name    = nameEl.value.trim();

  if (!name)          { errEl.textContent = 'Enter a name first.'; return; }
  if (name.length > 20) { errEl.textContent = 'Max 20 characters.'; return; }

  btn.disabled = true;
  btn.textContent = 'Submitting...';
  errEl.textContent = '';

  if (!gameSession) {
    // Session fetch may still be in-flight (slow connection) — try once more
    try {
      const _sr = await fetch(WORKER_URL + '/session');
      gameSession = await _sr.json();
    } catch(e) { gameSession = null; }
  }
  if (!gameSession) {
    errEl.textContent = 'Could not verify session — check your connection.';
    btn.disabled = false;
    btn.textContent = 'Submit Score';
    return;
  }

  try {
    const res  = await fetch(WORKER_URL + '/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nonce: gameSession.nonce, sig: gameSession.sig, score: score, name: name }),
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Submission failed.';
      btn.disabled = false;
      btn.textContent = 'Submit Score';
      return;
    }

    // Save identity and update HUD state
    playerName = data.name;
    localStorage.setItem('playerName', playerName);
    myRank = data.rank;
    if (myBest === null || score > myBest) myBest = score;

    // Show rank reveal
    const rank = data.rank;
    const cls  = rank === 1 ? 'rank-r1' : rank === 2 ? 'rank-r2' : rank === 3 ? 'rank-r3' : 'rank-rn';
    document.getElementById('rank-badge').className  = 'rank-badge ' + cls;
    document.getElementById('rank-badge').textContent = '#' + rank;
    document.getElementById('rank-name-disp').textContent  = data.name;
    document.getElementById('rank-score-disp').textContent = 'Score: ' + score.toLocaleString();
    showScreen('rank');

  } catch (e) {
    errEl.textContent = 'Connection error. Try again.';
    btn.disabled = false;
    btn.textContent = 'Submit Score';
  }
}

// ═══════════════════════════════════════════════════════════
//  LEADERBOARD SCREEN
// ═══════════════════════════════════════════════════════════
async function showLeaderboard(fromScreen) {
  document.getElementById('lb-from').value = fromScreen || 'home';
  document.getElementById('lb-list').innerHTML = '<p class="lb-loading">Loading...</p>';
  showScreen('leaderboard');

  try {
    const res   = await fetch(WORKER_URL + '/leaderboard');
    const board = await res.json();
    renderLeaderboard(board);
  } catch (e) {
    document.getElementById('lb-list').innerHTML = '<p class="lb-empty">Could not load — check your connection.</p>';
  }
}

function renderLeaderboard(board) {
  if (!board || board.length === 0) {
    document.getElementById('lb-list').innerHTML = '<p class="lb-empty">No scores yet — be the first!</p>';
    return;
  }
  var html = '';
  board.forEach(function(entry, i) {
    var rank = i + 1;
    var cls  = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : 'rn';
    html += '<div class="lb-row ' + cls + '">'
          + '<span class="lb-rank">#' + rank + '</span>'
          + '<span class="lb-name">'  + escHtml(entry.name)  + '</span>'
          + '<span class="lb-score">' + Number(entry.score).toLocaleString() + '</span>'
          + '<span class="lb-date">'  + (entry.date || '') + '</span>'
          + '</div>';
  });
  document.getElementById('lb-list').innerHTML = html;
}

function lbBack() {
  var from = document.getElementById('lb-from').value;
  showScreen(from === 'rank' ? 'rank' : 'home');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function loadMyStats() {
  if (!playerName) return;
  fetch(WORKER_URL + '/leaderboard')
    .then(function(r) { return r.json(); })
    .then(function(board) {
      var entry = board.find(function(e) { return e.name.toLowerCase() === playerName.toLowerCase(); });
      if (entry) {
        myBest = entry.score;
        myRank = board.indexOf(entry) + 1;
      }
    })
    .catch(function() {});
}

// Show home screen once the screen divs exist in the DOM
window.addEventListener('DOMContentLoaded', function() { showScreen('home'); loadMyStats(); });
</script>

<!-- ═══════════════════════════════════════════════════════
     SCREENS
     ═══════════════════════════════════════════════════════ -->

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="game-title">Ball Merge</div>
  <div class="game-sub">Merge your way to the top</div>
  <button class="btn btn-primary"    onclick="startGame()">Play</button>
  <button class="btn btn-secondary"  onclick="showLeaderboard('home')">Leaderboard</button>
</div>

<!-- SUBMIT (game over / cash out) -->
<div id="screen-submit" class="screen">
  <h2>Game Over</h2>
  <div class="score-label">Your score</div>
  <div class="score-big" id="final-score">0</div>
  <input  id="submit-name" class="name-input" type="text" maxlength="20"
          placeholder="Your name"
          oninput="updateCharCount()"
          onkeydown="if(event.key==='Enter')submitScore()">
  <div class="char-count" id="char-count">0 / 20</div>
  <div class="err" id="name-err"></div>
  <button id="submit-btn" class="btn btn-primary"   onclick="submitScore()">Submit Score</button>
  <button class="btn btn-secondary" onclick="playAgain()">Play Again</button>
  <button class="btn-ghost"         onclick="showScreen('home')">Menu</button>
</div>

<!-- RANK REVEAL -->
<div id="screen-rank" class="screen">
  <div class="rank-sub">You ranked</div>
  <div class="rank-badge rank-rn" id="rank-badge">#1</div>
  <div class="rank-name-disp"  id="rank-name-disp"></div>
  <div class="rank-score-disp" id="rank-score-disp"></div>
  <div class="btn-row">
    <button class="btn btn-primary"   onclick="playAgain()">Play Again</button>
    <button class="btn btn-secondary" onclick="showLeaderboard('rank')">Leaderboard</button>
  </div>
  <button class="btn-ghost" onclick="showScreen('home')">Menu</button>
</div>

<!-- LEADERBOARD -->
<div id="screen-leaderboard" class="screen">
  <input type="hidden" id="lb-from" value="home">
  <h2>Leaderboard</h2>
  <div id="lb-list" class="lb-wrap"></div>
  <div class="btn-row">
    <button class="btn btn-primary"   onclick="startGame()">Play</button>
    <button class="btn btn-secondary" onclick="lbBack()">Back</button>
  </div>
</div>

</body>
</html>
