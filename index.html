<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Merge">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<canvas id="c"></canvas>

<!-- ═══════════════════════════════════════════════════════
     SCREENS
     ═══════════════════════════════════════════════════════ -->

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="game-title">Ball Merge</div>
  <div class="game-sub">Merge your way to the top</div>
  <button class="btn btn-primary"    onclick="startGame()">Play</button>
  <button class="btn btn-secondary"  onclick="showLeaderboard('home')">Leaderboard</button>
</div>

<!-- SUBMIT (game over / cash out) -->
<div id="screen-submit" class="screen">
  <h2>Game Over</h2>
  <div class="score-label">Your score</div>
  <div class="score-big" id="final-score">0</div>
  <input  id="submit-name" class="name-input" type="text" maxlength="20"
          placeholder="Your name"
          oninput="updateCharCount()"
          onkeydown="if(event.key==='Enter')submitScore()">
  <div class="char-count" id="char-count">0 / 20</div>
  <div class="err" id="name-err"></div>
  <button id="submit-btn" class="btn btn-primary"   onclick="submitScore()">Submit Score</button>
  <button class="btn btn-secondary" onclick="playAgain()">Play Again</button>
  <button class="btn-ghost"         onclick="showScreen('home')">Menu</button>
</div>

<!-- RANK REVEAL -->
<div id="screen-rank" class="screen">
  <div class="rank-sub">You ranked</div>
  <div class="rank-badge rank-rn" id="rank-badge">#1</div>
  <div class="rank-name-disp"  id="rank-name-disp"></div>
  <div class="rank-score-disp" id="rank-score-disp"></div>
  <div class="btn-row">
    <button class="btn btn-primary"   onclick="playAgain()">Play Again</button>
    <button class="btn btn-secondary" onclick="showLeaderboard('rank')">Leaderboard</button>
  </div>
  <button class="btn-ghost" onclick="showScreen('home')">Menu</button>
</div>

<!-- LEADERBOARD -->
<div id="screen-leaderboard" class="screen">
  <input type="hidden" id="lb-from" value="home">
  <h2>Leaderboard</h2>
  <div id="lb-list" class="lb-wrap"></div>
  <div class="btn-row">
    <button class="btn btn-primary"   onclick="startGame()">Play</button>
    <button class="btn btn-secondary" onclick="lbBack()">Back</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════
     SCRIPTS  — loaded in dependency order.
     Custom Verlet+PBD soft-body engine. No external physics.
     ═══════════════════════════════════════════════════════ -->
<script src="js/config.js"></script>
<script src="js/util.js"></script>
<script src="js/canvas.js"></script>
<script src="js/physics.js"></script>
<script src="js/state.js"></script>
<script src="js/audio.js"></script>
<script src="js/blob.js"></script>
<script src="js/world.js"></script>
<script src="js/ball.js"></script>
<script src="js/game.js"></script>
<script src="js/render/scene.js"></script>
<script src="js/render/balls.js"></script>
<script src="js/input.js"></script>
<script src="js/loop.js"></script>
<script src="js/screens.js"></script>

</body>
</html>
